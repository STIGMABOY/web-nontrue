<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NonTrue Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4"><h1 style="color:#667eea;">Admin Panel</h1><p class="text-muted">NonTrue Checker Management</p></div>
        <form id="loginForm">
            <div class="mb-3"><input type="text" class="form-control" id="username" placeholder="Username" required></div>
            <div class="mb-3"><input type="password" class="form-control" id="password" placeholder="Password" required></div>
            <button type="submit" class="btn btn-primary login-btn">Login</button>
        </form>
        <div id="errorAlert" class="alert alert-danger mt-3 d-none"></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) { window.location.href = data.redirect; }
                else { errorAlert.textContent = data.error || 'Invalid credentials'; errorAlert.classList.remove('d-none'); }
            } catch (error) { errorAlert.textContent = 'Login failed'; errorAlert.classList.remove('d-none'); }
        });
    </script>
</body>
</html>
