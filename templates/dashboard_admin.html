<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NonTrue Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .token-display { background: #f8f9fa; padding: 15px; border-radius: 10px; font-family: monospace; word-break: break-all; }
    </style>
</head>
<body>
    <nav class="navbar navbar-custom navbar-dark">
        <div class="container">
            <span class="navbar-brand"><i class="fas fa-crown"></i> Admin Dashboard</span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header"><h5><i class="fas fa-key"></i> Generate New Token</h5></div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6"><input type="text" class="form-control" id="userId" placeholder="User ID (Optional)"></div>
                    <div class="col-md-4"><select class="form-control" id="validDays"><option value="1">1 Day</option><option value="7">7 Days</option><option value="30">30 Days</option><option value="90">90 Days</option></select></div>
                    <div class="col-md-2"><button class="btn btn-primary w-100" onclick="generateToken()"><i class="fas fa-plus"></i> Generate</button></div>
                </div>
                <div id="newTokenDiv" class="mt-3 d-none"><label>New Token:</label><div class="token-display"><span id="newToken"></span><i class="fas fa-copy float-end" style="cursor:pointer;" onclick="copyToken('newToken')"></i></div></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h5><i class="fas fa-list"></i> Active Tokens</h5></div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead><tr><th>Token</th><th>User ID</th><th>Expires</th><th>Uses</th><th>Actions</th></tr></thead>
                    <tbody id="tokensTable"><tr><td colspan="5" class="text-center">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadTokens() {
            const response = await fetch('/api/admin/tokens');
            const tokens = await response.json();
            const tbody = document.getElementById('tokensTable');
            if (tokens.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center">No active tokens</td></tr>'; return; }
            tbody.innerHTML = tokens.map(token => `<tr><td><code>${token.token}</code></td><td>${token.user_id}</td><td>${new Date(token.expires_at).toLocaleString()}</td><td>${token.uses}/${token.max_checks}</td><td><button class="btn btn-sm btn-danger" onclick="deleteToken('${token.full_token}')"><i class="fas fa-trash"></i></button></td></tr>`).join('');
        }

        async function generateToken() {
            const userId = document.getElementById('userId').value;
            const days = parseInt(document.getElementById('validDays').value);
            const response = await fetch('/api/admin/tokens', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId || undefined, days: days })
            });
            const data = await response.json();
            document.getElementById('newToken').textContent = data.token;
            document.getElementById('newTokenDiv').classList.remove('d-none');
            loadTokens();
            setTimeout(() => document.getElementById('newTokenDiv').classList.add('d-none'), 30000);
        }

        async function deleteToken(token) {
            if (confirm('Revoke this token?')) {
                await fetch(`/api/admin/tokens/${encodeURIComponent(token)}`, { method: 'DELETE' });
                loadTokens();
            }
        }

        function copyToken(elementId) {
            const token = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(token);
            alert('Token copied!');
        }

        async function logout() { await fetch('/api/admin/logout'); window.location.href = '/admin/login'; }
        loadTokens();
        setInterval(loadTokens, 30000);
    </script>
</body>
</html>
