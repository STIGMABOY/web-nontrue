<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NonTrue Roblox Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4"><h1 style="color:#667eea;">NonTrue Checker</h1><p class="text-muted">Enter Your Token</p></div>
        <form id="loginForm">
            <div class="mb-4">
                <input type="password" class="form-control" id="token" placeholder="Paste your token here..." required style="border-radius:10px;padding:12px;">
            </div>
            <button type="submit" class="btn btn-primary login-btn">Access Dashboard</button>
        </form>
        <div id="errorAlert" class="alert alert-danger mt-3 d-none"></div>
        <div class="text-center mt-4"><small class="text-muted">Powered by NonTrue Checker v1.0</small></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const errorAlert = document.getElementById('errorAlert');
            try {
                const response = await fetch('/api/validate-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });
                const data = await response.json();
                if (data.valid) {
                    document.cookie = `user_token=${token}; path=/; max-age=${60*60*24*30}`;
                    window.location.href = '/dashboard';
                } else {
                    errorAlert.textContent = 'Invalid or expired token. Please contact admin.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (error) {
                errorAlert.textContent = 'Error validating token. Please try again.';
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
